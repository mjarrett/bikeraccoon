name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e . pytest pytest-cov flake8

      - name: Lint
        run: flake8 bikeraccoon/ --max-line-length=120 --extend-ignore=E501,W503,E302,E303,F401,F403,F405,F841,E722

      - name: Test
        run: pytest tests/ -v --tb=short --cov=bikeraccoon --cov-report=term-missing

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: br-stg

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /srv/bikeraccoon
            git pull origin master
            /srv/bikeraccoon/.venv/bin/pip install -e . -q
            sudo systemctl restart br-tracker br-api br-dash

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: br-prod

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /srv/bikeraccoon
            git fetch --tags
            git checkout ${{ github.ref_name }}
            /srv/bikeraccoon/.venv/bin/pip install -e . -q
            sudo systemctl restart br-tracker br-api br-dash
