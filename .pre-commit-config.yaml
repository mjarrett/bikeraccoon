repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --extend-ignore=E501,W503,E302,E303,F401,F403,F405,F841,E722

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --no-sync pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
